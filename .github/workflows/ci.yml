name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-bun

      - run: bun run lint
      - run: bun run stylelint
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-bun
      - run: bun test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-bun
      - run: |
          NEXT_PUBLIC_FIREBASE_API_KEY=dummy \
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=dummy \
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=dummy \
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=dummy \
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=dummy \
          NEXT_PUBLIC_FIREBASE_APP_ID=dummy \
          NEXT_PUBLIC_FIREBASE_FIRESTORE_DATABASE_ID=dummy \
          FIREBASE_CLIENT_EMAIL=dummy \
          FIREBASE_PRIVATE_KEY=dummy \
          NEXT_PUBLIC_DISCORD_WEBHOOK_URL=dummy \
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=dummy \
          STRIPE_SECRET_KEY=dummy \
          STRIPE_WEBHOOK_SECRET=dummy \
          STRIPE_PRICE_ID_PRO_MONTHLY=dummy \
          STRIPE_PRICE_ID_PRO_YEARLY=dummy \
          STRIPE_DISCORD_WEBHOOK_URL=dummy \
          bun run build
