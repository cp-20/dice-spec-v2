name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          save_cache: 'true'

      - parallel:
          - name: Lint
            run: bun run lint
          - name: Lint styles
            run: bun run stylelint
          - name: Typecheck
            run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java
        id: java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
        background: true
      - uses: ./.github/actions/setup
      - wait: java
      - run: bun install --global firebase-tools@15.23.0
      - run: bun test

  deploy-firebase:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --global firebase-tools@15.23.0
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_FIREBASE_SERVICE_ACCOUNT }}
          token_format: access_token
      - run: >-
          firebase deploy
          --project dicespec-fd392
          --config firebase/firebase.json
          --only firestore:rules,firestore:indexes,storage
        env:
          FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: |
          NODE_ENV=production \
          NEXT_PUBLIC_FIREBASE_API_KEY=dummy \
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=dummy \
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=dummy \
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=dummy \
          NEXT_PUBLIC_FIREBASE_APP_ID=dummy \
          NEXT_PUBLIC_FIREBASE_FIRESTORE_DATABASE_ID=dummy \
          NEXT_PUBLIC_DISCORD_WEBHOOK_URL=dummy \
          bun run build
